spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        "[auto_quote_keyword]": true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 0

springdoc:
  server-url: http://localhost:8080

cors:
  allowed-origins:
    - http://localhost:3000

jwt:
  secret-key: test-secret-key-test-secret-key-1234567890

vton:
  adapter: fashn

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret

pipeline:
  poses-dir: target/test-poses
