spring:
  config:
    activate:
      on-profile: dockerprod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        "[default_schema]": bioracer
        "[auto_quote_keyword]": true
        "[format_sql]": true
    hibernate:
      ddl-auto: ${DDL_AUTO}
  flyway:
    locations: classpath:db/migration
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    schemas:
      - bioracer
    create-schemas: true

springdoc:
  server-url: ${API_URL}

cors:
  allowed-origins:
    - ${API_URL}
    - ${STUDIO_URL}

jwt:
  secret-key: ${JWT_SECRET_KEY}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
