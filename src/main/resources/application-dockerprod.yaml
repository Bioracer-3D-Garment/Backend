spring:
  config:
    activate:
      on-profile: dockerprod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        "[default_schema]": bioracer
        "[auto_quote_keyword]": true
        "[format_sql]": true
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}

springdoc:
  server-url: ${API_URL}

cors:
  allowed-origins:
    - ${API_URL}
    - ${STUDIO_URL}

jwt:
  secret-key: ${JWT_SECRET_KEY}

vton:
  adapter: fashn

fashn:
  api.key: ${FASHN_API_KEY:}
  base-url: https://api.fashn.ai/v1
  timeout-seconds: 120

fal:
  api.key: ${FAL_API_KEY:}
  model-id: fal-ai/kling-video/v3/pro/image-to-video
  queue-base-url: https://queue.fal.run
  timeout-seconds: 600
