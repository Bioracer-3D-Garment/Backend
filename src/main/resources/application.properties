spring.application.name=Backend
spring.devtools.add-properties=false

# --- AI Pipeline ---
# Adapter to use for virtual try-on: fashn | kling
vton.adapter=fashn

# Fashn.ai
fashn.api.key=
fashn.base-url=https://api.fashn.ai/v1
fashn.timeout-seconds=120

# Kling AI (video generation — stub until endpoint details are finalized)
kling.api.key=

# fal.ai — Kling v3 pro image-to-video (turntable video from Fashn front/back/side)
fal.api.key=
fal.model-id=fal-ai/kling-video/v3/pro/image-to-video
fal.queue-base-url=https://queue.fal.run
fal.timeout-seconds=600

# Batch pipeline directories (absolute paths on the server)
pipeline.output-dir=