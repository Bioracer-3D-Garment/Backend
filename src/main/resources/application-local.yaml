spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/bioracer?currentSchema=bioracer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        "[default_schema]": bioracer
        "[auto_quote_keyword]": true
        "[format_sql]": true
    hibernate:
      ddl-auto: create-drop
springdoc:
  server-url: ${API_URL}

cors:
  allowed-origins:
    - ${API_URL}
    - ${STUDIO_URL}

jwt:
  secret-key: ${JWT_SECRET_KEY}

pipeline:
  poses-dir: /home/eliasxmas/UCLL/Jaar 3/Semester 2/Bachelor Project/Bioracer 3D Garment/Backend/src/main/resources/poses
  output-dir: /home/eliasxmas/bioracer/output

vton:
  adapter: fashn

fashn:
  api.key: ${FASHN_API_KEY:}
  base-url: https://api.fashn.ai/v1
  timeout-seconds: 120
