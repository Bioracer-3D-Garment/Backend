spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:${DATABASE_PORT}/bioracer?currentSchema=bioracer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: true

    properties:
      hibernate:
        "[default_schema]": bioracer
        "[auto_quote_keyword]": true
        "[format_sql]": true
    hibernate:
      ddl-auto: create-drop
springdoc:
  server-url: ${API_URL}

cors:
  allowed-origins:
    - ${API_URL}
    - ${STUDIO_URL}

jwt:
  secret-key: ${JWT_SECRET_KEY}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

vton:
  adapter: fashn

fashn:
  api.key: ${FASHN_API_KEY:}
  base-url: https://api.fashn.ai/v1
  timeout-seconds: 120

fal:
  api.key: ${FAL_API_KEY:}
  model-id: fal-ai/kling-video/v3/pro/image-to-video
  queue-base-url: https://queue.fal.run
  timeout-seconds: 600
