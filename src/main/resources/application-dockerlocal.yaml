spring:
  config:
    activate:
      on-profile: dockerlocal
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        "[default_schema]": bioracer

springdoc:
  server-url: http://localhost:3000
