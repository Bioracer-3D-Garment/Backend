spring:
  config:
    activate:
      on-profile: dockerlocal
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/bioracer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        "[default_schema]": bioracer
        "[auto_quote_keyword]": true
        "[format_sql]": true
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    schemas:
      - bioracer
    create-schemas: true

springdoc:
  server-url: ${API_URL}

cors:
  allowed-origins:
    - ${API_URL}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key:    ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
