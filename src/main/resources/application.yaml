spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: bioracerBackend
  jpa:
    hibernate:
      ddl-auto: create-drop # Flyway manages the schema, not Hibernate
    properties:
      hibernate:
        "[auto_quote_keyword]": true
        "[format_sql]": true
    open-in-view: true

server:
  port: 3000

jwt:
  secret-key: ${JWT_SECRET_KEY}
